<!DOCTYPE html>
<html>

<head>
    <title>Calculator - Bilal Tariq</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .calc-container {
            background: linear-gradient(to bottom, #2c3e50, #34495e);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 320px;
        }
        .header {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        .screen {
            background: linear-gradient(to bottom, #1a252f, #0f1419);
            color: #00ff88;
            font-size: 32px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: right;
            border-radius: 8px;
            border: 2px solid #667eea;
            min-height: 50px;
            word-wrap: break-word;
            word-break: break-all;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }
        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .btn {
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn-number {
            background-color: #ecf0f1;
            color: #2c3e50;
        }
        .btn-number:hover {
            background-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        .btn-number:active {
            transform: translateY(0);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .btn-operation {
            background-color: #667eea;
            color: #fff;
        }
        .btn-operation:hover {
            background-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        .btn-operation:active {
            transform: translateY(0);
        }
        .btn-equals {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            grid-column: span 2;
            font-size: 18px;
        }
        .btn-equals:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 87, 108, 0.4);
        }
        .btn-equals:active {
            transform: translateY(0);
        }
        .btn-reset {
            background-color: #e74c3c;
            color: #fff;
            grid-column: span 2;
            font-size: 14px;
        }

        .btn-reset:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        .btn-memory {
            background-color: #27ae60;
            color: #fff;
            font-size: 12px;
            padding: 12px;
        }
        .btn-memory:hover {
            background-color: #229954;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        .btn:focus {
            outline: none;
        }
    </style>
</head>

<body>
    <div class="calc-container">
        <div class="header">BILAL TARIQ | BSCS14-C | CMS 529967</div>
        <div class="screen" id="screenPanel">0</div>
        <div class="keypad-grid">
            <button class="btn btn-memory" onclick="clearMemory()">MC</button>
            <button class="btn btn-memory" onclick="recallMemory()">MR</button>
            <button class="btn btn-memory" onclick="storeInMemory()">MS</button>
            <button class="btn btn-memory" onclick="addToMemory()">M+</button>

            <button class="btn btn-reset" onclick="resetScreen()">CLEAR</button>
            <button class="btn btn-operation" onclick="addOperator('+/-')">+/-</button>
            <button class="btn btn-operation" onclick="addOperator('/')">÷</button>
            <button class="btn btn-operation" onclick="addOperator('*')">×</button>

            <button class="btn btn-number" onclick="addDigit('7')">7</button>
            <button class="btn btn-number" onclick="addDigit('8')">8</button>
            <button class="btn btn-number" onclick="addDigit('9')">9</button>
            <button class="btn btn-operation" onclick="addOperator('-')">−</button>

            <button class="btn btn-number" onclick="addDigit('4')">4</button>
            <button class="btn btn-number" onclick="addDigit('5')">5</button>
            <button class="btn btn-number" onclick="addDigit('6')">6</button>
            <button class="btn btn-operation" onclick="addOperator('+')">+</button>

            <button class="btn btn-number" onclick="addDigit('1')">1</button>
            <button class="btn btn-number" onclick="addDigit('2')">2</button>
            <button class="btn btn-number" onclick="addDigit('3')">3</button>
            <button class="btn btn-operation" onclick="applySpecialOp('sqrt')">√</button>

            <button class="btn btn-number" onclick="addDigit('0')">0</button>
            <button class="btn btn-number" onclick="addDecimalPoint()">.</button>
            <button class="btn btn-operation" onclick="applySpecialOp('square')">x²</button>
            <button class="btn btn-operation" onclick="applySpecialOp('reciprocal')">1/x</button>

            <button class="btn btn-equals" onclick="computeResult()">=</button>
        </div>
    </div>

    <script>
        // Professional Calculator - Bilal Tariq BSCS14-C CMS 529967
        
        var screenPanel = document.getElementById('screenPanel');
        var savedValue = 0;
        var inputBuffer = '0';

        function refreshScreen() {
            screenPanel.innerText = inputBuffer;
        }

        function addDigit(digit) {
            if (inputBuffer === '0') {
                inputBuffer = digit;
            } else {
                inputBuffer += digit;
            }
            refreshScreen();
        }

        function addOperator(operand) {
            if (operand === '+/-') {
                if (inputBuffer !== '0') {
                    if (inputBuffer.charAt(0) === '-') {
                        inputBuffer = inputBuffer.substring(1);
                    } else {
                        inputBuffer = '-' + inputBuffer;
                    }
                }
            } else {
                if (inputBuffer !== '0') {
                    inputBuffer += operand;
                }
            }
            refreshScreen();
        }

        function addDecimalPoint() {
            if (!inputBuffer.includes('.')) {
                inputBuffer += '.0';
            }
            refreshScreen();
        }

        function resetScreen() {
            inputBuffer = '0';
            refreshScreen();
        }

        function computeResult() {
            try {
                var outcome = eval(inputBuffer);
                inputBuffer = outcome.toString();
            } catch (e) {
                inputBuffer = 'Error';
            }
            refreshScreen();
        }

        function applySpecialOp(operation) {
            var value = parseFloat(inputBuffer);
            if (operation === 'sqrt') {
                inputBuffer = Math.sqrt(value).toString();
            } else if (operation === 'square') {
                inputBuffer = (value * value).toString();
            } else if (operation === 'reciprocal') {
                if (value !== 0) {
                    inputBuffer = (1 / value).toString();
                } else {
                    inputBuffer = 'Infinity';
                }
            }
            refreshScreen();
        }

        function storeInMemory() {
            var value = parseFloat(inputBuffer);
            if (!isNaN(value)) {
                savedValue = value;
            }
        }

        function clearMemory() {
            savedValue = 0;
        }

        function recallMemory() {
            inputBuffer = savedValue.toString();
            refreshScreen();
        }

        function addToMemory() {
            var value = parseFloat(inputBuffer);
            if (!isNaN(value)) {
                savedValue += value;
            }
        }
    </script>
</body>

</html>
