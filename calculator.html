<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white;
        }

        .calculator {
            background-color: white;
            padding: 20px;
            border: 1px solid #000;
            width: 300px;
        }

        .display {
            background-color: white;
            color: #000;
            font-size: 24px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            border: 1px solid #000;
            min-height: 40px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 1px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: 1px solid #000;
            cursor: pointer;
            background-color: white;
            color: black;
        }

        button:hover {
            background-color: #f0f0f0;
        }

        .operator {
            background-color: white;
        }

        .operator:hover {
            background-color: #f0f0f0;
        }

        .equals {
            grid-column: span 3;
        }

        .equals:hover {
            background-color: #f0f0f0;
        }

        .clear {
            grid-column: span 2;
        }

        .clear:hover {
            background-color: #f0f0f0;
        }

        .memory {
            font-size: 14px;
            padding: 15px;
        }

        .memory:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="memory" onclick="memoryClear()">MC</button>
            <button class="memory" onclick="memoryRecall()">MR</button>
            <button class="memory" onclick="memoryStore()">MS</button>
            <button class="memory" onclick="memoryAdd()">M+</button>
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('+/-')">+/-</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="specialFunction('sqrt')">√</button>
            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendDecimal()">.</button>
            <button class="operator" onclick="specialFunction('square')">x²</button>
            <button class="operator" onclick="specialFunction('reciprocal')">1/x</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        var display = document.getElementById('display');
        var memory = 0;
        var currentInput = '0';
        function updateDisplay() {
            display.innerText = currentInput;
        }
        function appendNumber(num) {
            if (currentInput === '0') {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }
        function appendOperator(op) {
            if (op === '+/-') {
                if (currentInput !== '0') {
                    if (currentInput.charAt(0) === '-') {
                        currentInput = currentInput.substring(1);
                    } else {
                        currentInput = '-' + currentInput;
                    }
                }
            } else {
                if (currentInput !== '0') {
                    currentInput += op;
                }
            }
            updateDisplay();
        }
        function appendDecimal() {
            if (!currentInput.includes('.')) {
                currentInput += '.0';
            }
            updateDisplay();
        }
        function clearDisplay() {
            currentInput = '0';
            updateDisplay();
        }
        function calculate() {
            var result = eval(currentInput);
            currentInput = result.toString();
            updateDisplay();
        }
        function specialFunction(type) {
            var num = parseFloat(currentInput);
            if (type === 'sqrt') {
                currentInput = Math.sqrt(num).toString();
            } else if (type === 'square') {
                currentInput = (num * num).toString();
            } else if (type === 'reciprocal') {
                if (num !== 0) {
                    currentInput = (1 / num).toString();
                }
            }
            updateDisplay();
        }
        function memoryStore() {
            var num = parseFloat(currentInput);
            if (!isNaN(num)) {
                memory = num;
            }
        }
        function memoryClear() {
            memory = 0;
        }
        function memoryRecall() {
            currentInput = memory.toString();
            updateDisplay();
        }
        function memoryAdd() {
            var num = parseFloat(currentInput);
            if (!isNaN(num)) {
                memory += num;
            }
        }
    </script>
</body>

</html>
